#cloud-config
# Mutual Aid Form — first-boot automation for a fresh VPS.
#
# Runs the non-interactive hardening steps of deploy/remote-setup.sh at VPS
# provisioning time so the operator's SSH session lands on an already-hardened
# host. Pre-marks those steps in .remote_setup_state so the script resumes at
# the interactive steps (LUKS check, .env, Caddyfile, secrets, DNS, build).
#
# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  EDIT BEFORE USE                                                         ║
# ║                                                                          ║
# ║  1. Replace <REPO_URL> below with the actual HTTPS clone URL.            ║
# ║  2. Upload this file to the VPS provider's "user data" / "cloud-init"    ║
# ║     field when creating the server.                                      ║
# ║  3. Use a NON-US provider per the threat model (Njalla, 1984, Bahnhof,   ║
# ║     Flokinet). LUKS full-disk encryption MUST be enabled before the      ║
# ║     server boots with any data on it — cloud-init cannot do that.        ║
# ╚══════════════════════════════════════════════════════════════════════════╝
#
# Post-boot steps (manual, in order):
#   1. ssh deploy@<server-ip>
#   2. cd /opt/mutual-aid
#   3. sudo ./deploy/remote-setup.sh
#      Resumes at `luks_verify` — steps 1, 4-7 are pre-marked done.
#   4. podman exec -it mutual-aid-web-1 python manage.py createsuperuser

timezone: America/Chicago
package_update: true
package_upgrade: true

packages:
  - podman
  - podman-compose
  - aardvark-dns
  - uidmap
  - passt
  - git
  - sqlite3
  - age
  - cryptsetup-bin
  - curl
  - ufw
  - fail2ban
  - unattended-upgrades

users:
  - name: deploy
    shell: /bin/bash
    groups: [sudo]
    sudo: "ALL=(ALL) NOPASSWD:ALL"

write_files:
  # fail2ban: SSH jail
  - path: /etc/fail2ban/jail.d/mutual-aid.local
    owner: root:root
    permissions: '0644'
    content: |
      # Mutual Aid Form — fail2ban jails
      # Written by cloud-init

      [DEFAULT]
      bantime  = 1h
      findtime = 10m
      maxretry = 5

      [sshd]
      enabled  = true
      port     = ssh
      maxretry = 3

  # Kernel hardening. NOTE: net.ipv4.ip_forward left at distro default (podman
  # needs it enabled for bridge networking).
  - path: /etc/sysctl.d/99-mutual-aid-hardening.conf
    owner: root:root
    permissions: '0644'
    content: |
      # Mutual Aid Form — Kernel hardening
      # Written by cloud-init

      # Decrypted PII lives in RAM — never page it to disk
      vm.swappiness = 0

      # Rootless podman binds :80 and :443 for Caddy. Default threshold is 1024;
      # lower it so the deploy user can publish those ports.
      net.ipv4.ip_unprivileged_port_start = 80

      # SYN flood protection
      net.ipv4.tcp_syncookies = 1
      net.ipv4.tcp_max_syn_backlog = 2048
      net.ipv4.tcp_synack_retries = 2

      # ICMP hardening
      net.ipv4.icmp_echo_ignore_broadcasts = 1
      net.ipv4.icmp_ignore_bogus_error_responses = 1

      # Disable ICMP redirects (not a router)
      net.ipv4.conf.all.send_redirects = 0
      net.ipv4.conf.default.send_redirects = 0
      net.ipv4.conf.all.accept_redirects = 0
      net.ipv4.conf.default.accept_redirects = 0
      net.ipv6.conf.all.accept_redirects = 0

      # Source routing (spoofing)
      net.ipv4.conf.all.accept_source_route = 0
      net.ipv4.conf.default.accept_source_route = 0

      # Reverse path filtering (anti-spoofing)
      net.ipv4.conf.all.rp_filter = 1
      net.ipv4.conf.default.rp_filter = 1

      # Log packets with impossible source addresses
      net.ipv4.conf.all.log_martians = 1

  # Daily security update downloads + installs
  - path: /etc/apt/apt.conf.d/20auto-upgrades
    owner: root:root
    permissions: '0644'
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Download-Upgradeable-Packages "1";
      APT::Periodic::AutocleanInterval "7";
      APT::Periodic::Unattended-Upgrade "1";

runcmd:
  # Copy root's SSH key to deploy user
  - mkdir -p /home/deploy/.ssh
  - cp /root/.ssh/authorized_keys /home/deploy/.ssh/authorized_keys
  - chown -R deploy:deploy /home/deploy/.ssh
  - chmod 700 /home/deploy/.ssh
  - chmod 600 /home/deploy/.ssh/authorized_keys

  # App directory owned by deploy
  - mkdir -p /opt/mutual-aid
  - chown deploy:deploy /opt/mutual-aid

  # Rootless podman containers must survive logout
  - loginctl enable-linger deploy

  # Firewall — SSH + HTTP + HTTPS
  - ufw allow 22
  - ufw allow 80
  - ufw allow 443
  - ufw --force enable

  # Podman bridge rules so aardvark-dns is reachable from containers
  # (UFW's default INPUT DROP otherwise silently breaks container DNS)
  - |
    if ! grep -q 'podman+' /etc/ufw/before.rules 2>/dev/null; then
      sed -i '/^COMMIT$/i # Allow podman bridge traffic (aardvark-dns + container routing)\n-A ufw-before-input -i podman+ -j ACCEPT\n-A ufw-before-forward -i podman+ -j ACCEPT\n-A ufw-before-forward -o podman+ -j ACCEPT' /etc/ufw/before.rules
      ufw reload
    fi

  # Apply kernel hardening
  - sysctl --system

  # Enable fail2ban
  - systemctl enable fail2ban
  - systemctl restart fail2ban

  # Disable auto-reboot — containers don't come back up without secrets being
  # re-mounted, and decrypted PII in RAM is lost. Reboots are manual.
  - |
    if [ -f /etc/apt/apt.conf.d/50unattended-upgrades ]; then
      sed -i 's|//Unattended-Upgrade::Automatic-Reboot ".*";|Unattended-Upgrade::Automatic-Reboot "false";|' /etc/apt/apt.conf.d/50unattended-upgrades
      sed -i 's|Unattended-Upgrade::Automatic-Reboot "true";|Unattended-Upgrade::Automatic-Reboot "false";|' /etc/apt/apt.conf.d/50unattended-upgrades
    fi
  - systemctl enable unattended-upgrades
  - systemctl restart unattended-upgrades

  # Clone the repo as deploy. ***EDIT THE URL BEFORE USE.***
  - sudo -u deploy git clone git@github.com:antoineclaval/private-form.git /opt/mutual-aid

  # Pre-mark the steps cloud-init just completed so remote-setup.sh skips them.
  - printf '%s\n' system_deps firewall fail2ban sysctl_harden auto_updates > /opt/mutual-aid/.remote_setup_state
  - chown deploy:deploy /opt/mutual-aid/.remote_setup_state

  - touch /opt/mutual-aid/.cloud-init-done
